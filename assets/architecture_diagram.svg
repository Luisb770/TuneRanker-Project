<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <title>TuneRanker System Architecture Diagram</title>
  <desc>Shows how user input flows through the hybrid recommendation engine combining content-based and collaborative filtering, with evaluation metrics.</desc>

  <style>
    text { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    .title { font-size: 14px; font-weight: 600; fill: #1e1e2f; }
    .subtitle { font-size: 11px; fill: #64748b; }
    .arrow-label { font-size: 10px; fill: #94a3b8; }
    .box { rx: 10; stroke-width: 1.2; }
    .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-split { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User Input -->
  <rect x="230" y="20" width="220" height="56" class="box" fill="#eef2ff" stroke="#818cf8"/>
  <text x="340" y="43" text-anchor="middle" class="title" fill="#3730a3">User input</text>
  <text x="340" y="59" text-anchor="middle" class="subtitle">Genre, mood, energy, liked songs</text>

  <!-- Arrow down to Streamlit -->
  <line x1="340" y1="76" x2="340" y2="108" class="arrow"/>

  <!-- Streamlit UI -->
  <rect x="230" y="108" width="220" height="50" class="box" fill="#f0fdf4" stroke="#4ade80"/>
  <text x="340" y="130" text-anchor="middle" class="title" fill="#166534">Streamlit UI</text>
  <text x="340" y="145" text-anchor="middle" class="subtitle">Interactive frontend (app.py)</text>

  <!-- Arrow down to Hybrid -->
  <line x1="340" y1="158" x2="340" y2="195" class="arrow"/>

  <!-- Hybrid Recommender (center box, larger) -->
  <rect x="190" y="195" width="300" height="56" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="340" y="218" text-anchor="middle" class="title" fill="#92400e">Hybrid recommender</text>
  <text x="340" y="234" text-anchor="middle" class="subtitle">Blends scores (configurable weights)</text>

  <!-- Split arrows to Content and Collab -->
  <line x1="270" y1="251" x2="150" y2="300" class="arrow"/>
  <line x1="410" y1="251" x2="530" y2="300" class="arrow"/>

  <!-- Content-Based Engine -->
  <rect x="40" y="300" width="220" height="56" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="150" y="323" text-anchor="middle" class="title" fill="#5b21b6">Content-based engine</text>
  <text x="150" y="339" text-anchor="middle" class="subtitle">KNN on audio features (sklearn)</text>

  <!-- Collaborative Engine -->
  <rect x="420" y="300" width="220" height="56" class="box" fill="#fce7f3" stroke="#ec4899"/>
  <text x="530" y="323" text-anchor="middle" class="title" fill="#9d174d">Collaborative engine</text>
  <text x="530" y="339" text-anchor="middle" class="subtitle">NearestNeighbors on ratings</text>

  <!-- Data sources under engines -->
  <line x1="150" y1="356" x2="150" y2="390" class="arrow-split"/>
  <line x1="530" y1="356" x2="530" y2="390" class="arrow-split"/>

  <rect x="70" y="390" width="160" height="44" class="box" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="150" y="410" text-anchor="middle" class="title" fill="#334155">songs.csv</text>
  <text x="150" y="425" text-anchor="middle" class="subtitle">100 songs, 10 features</text>

  <rect x="450" y="390" width="160" height="44" class="box" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="530" y="410" text-anchor="middle" class="title" fill="#334155">user_ratings.csv</text>
  <text x="530" y="425" text-anchor="middle" class="subtitle">20 users, 200 ratings</text>

  <!-- Arrows back up to Hybrid from engines -->
  <line x1="150" y1="300" x2="270" y2="251" class="arrow" style="marker-end:none" stroke-dasharray="0"/>
  <line x1="530" y1="300" x2="410" y2="251" class="arrow" style="marker-end:none" stroke-dasharray="0"/>

  <!-- Output arrow from Hybrid -->
  <line x1="340" y1="251" x2="340" y2="460" class="arrow"/>

  <!-- Output -->
  <rect x="210" y="460" width="260" height="50" class="box" fill="#ecfdf5" stroke="#34d399"/>
  <text x="340" y="480" text-anchor="middle" class="title" fill="#065f46">Recommendations + metrics</text>
  <text x="340" y="496" text-anchor="middle" class="subtitle">Confidence scores, explanations, diversity</text>

  <!-- Evaluation box (right side) -->
  <rect x="490" y="195" width="170" height="56" class="box" fill="#fff7ed" stroke="#fb923c"/>
  <text x="575" y="215" text-anchor="middle" class="title" fill="#9a3412">Evaluation</text>
  <text x="575" y="231" text-anchor="middle" class="subtitle">Precision, coverage, tests</text>

  <!-- Logging box (left side) -->
  <rect x="20" y="195" width="160" height="56" class="box" fill="#f0f9ff" stroke="#38bdf8"/>
  <text x="100" y="215" text-anchor="middle" class="title" fill="#0c4a6e">Logging</text>
  <text x="100" y="231" text-anchor="middle" class="subtitle">recommender.log</text>

  <!-- Dashed arrows to evaluation and logging -->
  <line x1="490" y1="223" x2="492" y2="223" class="arrow-split"/>
  <line x1="180" y1="223" x2="190" y2="223" class="arrow-split" style="marker-end:none"/>
</svg>